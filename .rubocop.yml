plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-minitest
  - rubocop-capybara

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  TargetRailsVersion: 7.1
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'db/migrate/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'
    - 'vendor/**/*'

# ── Layout ────────────────────────────────────────────────────────────────────

Layout/LineLength:
  Max: 120

# ── Style ─────────────────────────────────────────────────────────────────────

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/WordArray:
  Enabled: false

Style/ConditionalAssignment:
  Enabled: false

Style/RedundantReturn:
  Enabled: false

Style/MutableConstant:
  Enabled: false

Style/SignalException:
  Enabled: false

Style/EmptyMethod:
  Enabled: false

# ── Metrics ───────────────────────────────────────────────────────────────────

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Max: 20

Metrics/BlockLength:
  Exclude:
    - 'config/routes.rb'

Metrics/ClassLength:
  Exclude:
    - 'app/controllers/recording_sessions_controller.rb'

# ── Lint ──────────────────────────────────────────────────────────────────────

Lint/MissingSuper:
  Enabled: false

# ── Bundler ───────────────────────────────────────────────────────────────────

Bundler/OrderedGems:
  Enabled: false

# ── Rails ─────────────────────────────────────────────────────────────────────

Rails/FilePath:
  EnforcedStyle: arguments

# ── Minitest ──────────────────────────────────────────────────────────────────

Minitest/MultipleAssertions:
  Enabled: false
